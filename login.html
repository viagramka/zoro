<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Крастакт</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #2d2d2d; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-page { width: 100%; max-width: 480px; margin: 0 auto; }
        .login-card { background: #252525; border-radius: 32px; padding: 40px 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: fadeInUp 0.5s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo-icon { width: 70px; height: 70px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; }
        .logo-icon img { width: 80px; }
        .logo h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo p { color: #6c757d; font-size: 0.9rem; margin-top: 8px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: white; font-size: 0.9rem; }
        .input-wrapper input { width: 100%; padding: 14px 16px; border: 2px solid #3a3a3a; background: #1a1a1a; color: white; border-radius: 16px; font-size: 1rem; font-family: 'Inter', sans-serif; }
        .input-wrapper input:focus { outline: none; border-color: #dc2626; box-shadow: 0 0 0 3px rgba(220,38,38,0.1); }
        .btn-login { width: 100%; background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.2s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(220,38,38,0.3); }
        .links { margin-top: 24px; text-align: center; }
        .links a { color: #dc2626; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .register-link { margin-top: 16px; padding-top: 16px; border-top: 1px solid #e9ecef; }
        .register-link span { color: #6c757d; font-size: 0.9rem; }
        .error-message { background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 12px; font-size: 0.85rem; margin-top: 16px; display: flex; align-items: center; gap: 8px; }
        .success-message { background: #d1fae5; color: #059669; padding: 12px; border-radius: 12px; font-size: 0.85rem; margin-top: 16px; display: flex; align-items: center; gap: 8px; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; display: inline-block; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) { .login-card { padding: 32px 24px; } .logo-icon { width: 60px; height: 60px; } .logo h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon"><img src="icon.png" style="width: 80px;"></div>
                <h1>Крастакт</h1>
                <p>Войдите в свой аккаунт!</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" placeholder="example@mail.com" autocomplete="email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Введите пароль" autocomplete="current-password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span>Войти</span>
                </button>
            </form>

            <div id="messageContainer"></div>

            <div class="links">
                <div class="register-link">
                    <span>Нет аккаунта?</span>
                    <a href="register.html"> Зарегистрироваться</a>
                </div>
            </div>
            
            <button class="btn-login" onclick="window.location.href='download-android.html';" style="margin-top: 16px;">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M40-240q9-107 65.5-197T256-580l-74-128q-6-9-3-19t13-15q8-5 18-2t16 12l74 128q86-36 180-36t180 36l74-128q6-9 16-12t18 2q10 5 13 15t-3 19l-74 128q94 53 150.5 143T920-240H40Zm275.5-124.5Q330-379 330-400t-14.5-35.5Q301-450 280-450t-35.5 14.5Q230-421 230-400t14.5 35.5Q259-350 280-350t35.5-14.5Zm400 0Q730-379 730-400t-14.5-35.5Q701-450 680-450t-35.5 14.5Q630-421 630-400t14.5 35.5Q659-350 680-350t35.5-14.5Z"/></svg>
                <span>Скачать приложение для Android</span>
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBX0fnvfVbsfTiuksc2JtebtmaltgAS87U",
            authDomain: "krastakt.firebaseapp.com",
            databaseURL: "https://krastakt-default-rtdb.firebaseio.com",
            projectId: "krastakt",
            storageBucket: "krastakt.firebasestorage.app",
            messagingSenderId: "53885771537",
            appId: "1:53885771537:web:d293118c77625af7c136b0"
        };

        let isLoading = false;

        function showMessage(type, text) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="${type}-message"><span>${text}</span></div>`;
            setTimeout(() => { container.innerHTML = ''; }, 5000);
        }

        async function signIn(email, password) {
            const url = `https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=${firebaseConfig.apiKey}`;
            
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, returnSecureToken: true })
            });
            
            const data = await response.json();
            
            if (!response.ok) {
                let errorMessage = "Ошибка входа";
                switch (data.error?.message) {
                    case 'EMAIL_NOT_FOUND':
                        errorMessage = "Пользователь с таким email не найден";
                        break;
                    case 'INVALID_PASSWORD':
                        errorMessage = "Неверный пароль";
                        break;
                    default:
                        errorMessage = data.error?.message || "Ошибка входа";
                }
                throw new Error(errorMessage);
            }
            
            return {
                localId: data.localId,
                idToken: data.idToken,
                email: data.email,
                refreshToken: data.refreshToken,
                password: password
            };
        }

        async function fetchUserData(userId, idToken) {
            const url = `https://krastakt-default-rtdb.firebaseio.com/users/${userId}.json?auth=${idToken}`;
            const response = await fetch(url);
            if (!response.ok) return null;
            const data = await response.json();
            return data;
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            if (isLoading) return;
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email) {
                showMessage('error', 'Введите email');
                return;
            }
            
            if (!password) {
                showMessage('error', 'Введите пароль');
                return;
            }
            
            isLoading = true;
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.innerHTML = '<div class="spinner"></div><span>Вход...</span>';
            loginBtn.disabled = true;
            
            try {
                const userData = await signIn(email, password);
                
                const userDbData = await fetchUserData(userData.localId, userData.idToken);
                const displayName = userDbData?.displayName || userData.email.split('@')[0];
                
                const userToStore = {
                    localId: userData.localId,
                    idToken: userData.idToken,
                    email: userData.email,
                    password: userData.password,
                    refreshToken: userData.refreshToken,
                    displayName: displayName
                };
                
                localStorage.setItem('volgura_user', JSON.stringify(userToStore));
                
                showMessage('success', 'Вход выполнен успешно! Перенаправление...');
                
                if (displayName === "DELETED") {
                    setTimeout(() => {
                        window.location.href = 'set.html';
                    }, 1500);
                } else {
                    setTimeout(() => {
                        window.location.href = 'feed.html';
                    }, 1500);
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showMessage('error', error.message);
            } finally {
                isLoading = false;
                loginBtn.innerHTML = '<span>Войти</span>';
                loginBtn.disabled = false;
            }
        }

        function checkExistingSession() {
            const savedUser = localStorage.getItem('volgura_user') || sessionStorage.getItem('volgura_user');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    if (user.displayName === "DELETED") {
                        window.location.href = 'set.html';
                    } else {
                        window.location.href = 'feed.html';
                    }
                } catch(e) {
                    window.location.href = 'feed.html';
                }
            }
        }

        function init() {
            checkExistingSession();
            const form = document.getElementById('loginForm');
            form.addEventListener('submit', handleLogin);
            document.getElementById('email').focus();
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
